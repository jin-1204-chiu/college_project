<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>嘉義大飯店</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <audio id="bg-music" loop>
      <source
        src="{{ url_for('static', filename='music/bgm.mp3') }}"
        type="audio/mpeg"
      />
    </audio>

    <iframe
      src="{{ url_for('home') }}"
      name="content-frame"
      id="content-frame"
    ></iframe>

    <script>
      var audio = document.getElementById("bg-music");
      var iframe = document.getElementById("content-frame");
      audio.volume = 0.3;

      // --- 核心播放函式 ---
      function tryPlayMusic() {
        // 如果已經在播了，就不用再試了
        if (!audio.paused) return;

        audio
          .play()
          .then(() => {
            console.log("🎵 音樂啟動成功！");
            // 成功後移除所有監聽，節省效能
            removeAllListeners();
          })
          .catch((e) => {
            console.log("等待更明確的互動...");
          });
      }

      // --- 移除監聽器 (清理工作) ---
      function removeAllListeners() {
        window.removeEventListener("click", tryPlayMusic);
        try {
          var iframeDoc =
            iframe.contentDocument || iframe.contentWindow.document;
          iframeDoc.removeEventListener("click", tryPlayMusic);
        } catch (e) {}
      }

      // --- 1. 監聽外殼本身 (以防萬一使用者點到邊邊) ---
      window.addEventListener("click", tryPlayMusic);

      // --- 2. 【關鍵修正】監聽 Iframe 內部 ---
      // 每當 Iframe載入新頁面 (onload) 時，我們都要重新把監聽器掛進去
      iframe.onload = function () {
        try {
          // 抓取 Iframe 裡面的 document
          var iframeDoc =
            iframe.contentDocument || iframe.contentWindow.document;

          // 在 Iframe 裡面掛上點擊監聽
          iframeDoc.addEventListener("click", tryPlayMusic);

          // 加碼：也在 Iframe 裡面監聽滾動 (增加成功率)
          iframeDoc.addEventListener("scroll", tryPlayMusic);

          console.log("已成功監聽 Iframe 內部點擊事件");
        } catch (e) {
          console.log("無法存取 Iframe (可能跨域限制，但在本機不該發生): " + e);
        }
      };
    </script>
  </body>
</html>
